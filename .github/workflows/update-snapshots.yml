name: Update Visual Snapshots

on:
  workflow_dispatch: {}

jobs:
  update-snapshots:
    name: Regenerate Linux baselines
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Resolve staging env
        env:
          BASE_URL_STAGING:  ${{ secrets.BASE_URL_STAGING }}
          SAUCE_URL_STAGING: ${{ secrets.SAUCE_URL_STAGING }}
        run: |
          echo "ENV=staging"                        >> $GITHUB_ENV
          echo "HEADLESS=true"                      >> $GITHUB_ENV
          echo "TIMEOUT=60000"                      >> $GITHUB_ENV
          echo "BASE_URL=${BASE_URL_STAGING}"       >> $GITHUB_ENV
          echo "SAUCE_URL=${SAUCE_URL_STAGING}"     >> $GITHUB_ENV

      - name: Generate Linux baselines
        run: npx playwright test src/tests/visual/visual.test.ts --update-snapshots
        env:
          CI: true
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}

      - name: Upload snapshots as artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-visual-snapshots
          path: src/tests/visual/visual.test.ts-snapshots/*-linux.png
          retention-days: 7
